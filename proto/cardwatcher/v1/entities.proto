syntax = "proto3";
package cardwatcher.v1;

enum Condition {
  CONDITION_UNSPECIFIED = 0;
  CONDITION_NEAR_MINT = 1;
  CONDITION_SLIGHTLY_PLAYED = 2;
  CONDITION_MODERATELY_PLAYED = 3;
  CONDITION_PLAYED = 4;
  CONDITION_POOR = 5;
}

enum Language {
  LANGUAGE_UNSPECIFIED = 0;
  LANGUAGE_EN = 1;
  LANGUAGE_DE = 2;
  LANGUAGE_FR = 3;
  LANGUAGE_IT = 4;
  LANGUAGE_JP = 5;
  LANGUAGE_PT = 6;
  LANGUAGE_ES = 7;
}

message Expansion {
  uint64 id = 1;
  string code = 2;
  string name = 3;
}

message Blueprint {
  uint64 id = 1;
  string name = 2;
  uint64 expansion_id = 3;
}

message Watch {
  string watch_id = 1;
  string name = 2;
  uint64 expansion_id = 3;
  uint64 blueprint_id = 4;
  Condition condition = 5;
  bool foil = 6;
  string expansion_name = 7;
  Language language = 8;
}
