syntax = "proto3";
package cardwatcher.v1;

import "cardwatcher/v1/entities.proto";

message ListExpansionsResponse {
  repeated Expansion expansions = 1;
}

message ListBlueprintsResponse {
  repeated Blueprint blueprints = 1;
}

message SaveWatchResponse {
  string watch_id = 1;
}

message ListWatchesResponse {
  repeated Watch watches = 1;
}
