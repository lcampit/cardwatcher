syntax = "proto3";
package cardwatcher.v1;

import "cardwatcher/v1/entities.proto";

message ListExpansionsRequest {
  string name = 1;
  string code = 2;
  string game = 3;
}

message ListBlueprintsRequest {
  uint64 expansion_id = 1;
  string name = 2;
}

message SaveWatchRequest {
  uint64 expansion_id = 2;
  uint64 blueprint_id = 3;
  Condition condition = 4;
  bool foil = 5;
  Language language = 6;
}

message DeleteWatchByIDRequest {
  string watch_id = 1;
}
