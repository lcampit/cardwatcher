syntax = "proto3";
package cardwatcher.v1;

import "cardwatcher/v1/requests.proto";
import "cardwatcher/v1/responses.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

service CardWatcherService {
  rpc CreateWatch(CreateWatchRequest) returns (CreateWatchResponse) {
    option (google.api.http) = {
      post: "/api/v1/watches"
      body: "*"
    };
  }

  rpc ListExpansions(ListExpansionsRequest) returns (ListExpansionsResponse) {
    option (google.api.http) = {get: "/api/v1/expansions"};
  }
  rpc ListBlueprints(ListBlueprintsRequest) returns (ListBlueprintsResponse) {
    option (google.api.http) = {get: "/api/v1/blueprints"};
  }
  rpc ListWatches(google.protobuf.Empty) returns (ListWatchesResponse) {
    option (google.api.http) = {get: "/api/v1/watches"};
  }
  rpc DeleteWatchByID(DeleteWatchByIDRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/api/v1/watches/{watch_id}"};
  }
}
