version: "2"
linters:
  enable:
    - sloglint
    - staticcheck
    - gosec
    - prealloc
    - goconst
    - unconvert
    - misspell
    - unparam
    - nakedret
    - dupl

  settings:
    sloglint:
      no-global: "all"
      static-msg: true
      attr-only: true
      msg-style: "lowercased"
      key-naming-case: "snake"
      args-on-sep-lines: true
      forbidden-keys:
        - "time"
        - "level"
        - "msg"
        - "source"
    errcheck:
      check-type-assertions: true

    dupl:
      threshold: 100

    gosec:
      excludes:
        - G402

    goconst:
      min-occurrences: 5

formatters:
  enable:
    - goimports
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
      module-path: "github.com/lcampit/cardwatcher"
    goimports:
      local-prefixes:
        - "github.com/lcampit/cardwatcher"
