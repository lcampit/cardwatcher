name: lint-and-test
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  golanci-lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v3
        with:
          install: true
          install_args: "-j 1"
          mise_toml: |
            [tools]
            go = "1.24"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.8.0
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v3
        with:
          install: true
          install_args: "-j 1"
          mise_toml: |
            [tools]
            go = "1.24"
            "go:gotest.tools/gotestsum" = "v1.12.2"
      - run: mise run test
