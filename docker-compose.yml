services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    ports:
      - ${SERVER_PORT}:${SERVER_PORT}
    environment:
      APP_ENV: ${APP_ENV}
      SERVER_PORT: ${SERVER_PORT}
      LOG_LEVEL: ${LOG_LEVEL}
      NOTIFICATION_SCHEDULE: ${NOTIFICATION_SCHEDULE}
      UPDATE_MAPS_SCHEDULE: ${UPDATE_MAPS_SCHEDULE}
      MONGO_HOST: mongo
      MONGO_PORT: ${MONGO_PORT}
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DATABASE: ${MONGO_DATABASE}
      MONGO_WATCH_COLLECTION_NAME: ${MONGO_WATCH_COLLECTION_NAME}
      MONGO_USE_REPLICASET: true
      CARDTRADER_ACCESS_TOKEN: ${CARDTRADER_ACCESS_TOKEN}
      CARDTRADER_API_BASE_URL: ${CARDTRADER_API_BASE_URL}
      NTFY_HOST: ntfy
      NTFY_PORT: ${NTFY_PORT}
    depends_on:
      mongo:
        condition: service_healthy
      mongo-init-rs:
        condition: service_completed_successfully
    networks:
      - watcher_network
  mongo:
    image: mongo:8
    restart: unless-stopped
    container_name: mongo
    command:
      [
        "--auth",
        "--bind_ip_all",
        "--replSet",
        "rs0",
        "--setParameter",
        "authenticationMechanisms=SCRAM-SHA-256",
        "--keyFile",
        "/data/configdb/mongo-keyfile",
      ]
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_DATABASE: ${MONGO_DATABASE}
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_db:/data/db
      - mongo_config:/data/configdb
      - ./.mongo-init:/docker-entrypoint-initdb.d:ro
      - ./.mongo-scripts:/scripts:ro
    healthcheck:
      test: ["CMD-SHELL", "/scripts/healthcheck.sh"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - watcher_network
  mongo-init-rs:
    image: mongo:8
    depends_on:
      mongo:
        condition: service_healthy
    command: /scripts/init-rs.sh
    volumes:
      - ./.mongo-scripts:/scripts:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    networks:
      - watcher_network
    restart: "no"

  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy
    command:
      - serve
    environment:
      - TZ=CEST
    volumes:
      - /var/cache/ntfy:/var/cache/ntfy
      - /etc/ntfy:/etc/ntfy
    ports:
      - ${NTFY_PORT}:80
    healthcheck: # optional: remember to adapt the host:port to your environment
      test:
        [
          "CMD-SHELL",
          "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - watcher_network

volumes:
  mongo_db:
  mongo_config:
networks:
  watcher_network:
