[tools]
go = "1.26.1"
docker-compose = "latest"
"go:gotest.tools/gotestsum" = "v1.12.2"
buf = "1.65"
golangci-lint = "v2.8.0"
lefthook = "v2.0.15"

[env]
LOG_LEVEL = "debug"
SERVER_PORT = 3000
SERVER_HOST = "localhost"
GATEWAY_PORT = 8081
MONGO_PORT = 27017
NTFY_PORT = 80
MONGO_DATABASE = "cardwatcher"
CARDTRADER_API_BASE_URL = "https://api.cardtrader.com/api/v2"
NOTIFICATION_SCHEDULE = "* * * * *"
UPDATE_MAPS_SCHEDULE = "0 4 * * *"
MONGO_WATCH_COLLECTION_NAME = "watches"
SERVER_HEALTH_CHECK_INTERVAL_MILLISECONDS = 1000
SERVER_ENABLE_REFLECTION = true

[settings]
lockfile = true
