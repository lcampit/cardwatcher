[tools]
go = "1.24"
docker-compose = "latest"
"go:github.com/air-verse/air" = "v1.62"
"go:github.com/fullstorydev/grpcurl/cmd/grpcurl" = "1.9.2"
"go:gotest.tools/gotestsum" = "v1.12.2"
protoc-gen-go = "v1.36.6"
protoc-gen-go-grpc = "1.5.1"
"cargo:https://github.com/pamburus/hl.git" = "latest"
"go:github.com/aurc/loggo" = "latest"
protoc = "31.1"
gh = "2.80.0"
"go:github.com/unkn0wn-root/resterm/cmd/resterm" = "v0.19.1"
golangci-lint = "v2.8.0"
act = "0.2.84"

[env]
APP_ENV = "DEV"
LOG_LEVEL = "debug"
SERVER_PORT = 3000
MONGO_PORT = 27017
NTFY_PORT = 80
MONGO_DATABASE = "cardwatcher"
CARDTRADER_API_BASE_URL = "https://api.cardtrader.com/api/v2"
NOTIFICATION_SCHEDULE = "* * * * *"

[settings]
lockfile = true
